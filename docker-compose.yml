version: '3.8'

services:
  leaf-petals-web:
    build: .
    container_name: leaf_petals_app
    # External traffic hits 8081, internal container listens on native 3000
    ports:
      - "8081:3000"
    environment:
      - MONGODB_URI=mongodb://leaf-petals-db:27017/LeafPetals
      - NEXTAUTH_SECRET=my_super_secret_plant_shop_key_2026
      - NEXTAUTH_URL=http://localhost:8081
      - NEXTAUTH_URL_INTERNAL=http://127.0.0.1:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NODE_ENV=production
    depends_on:
      - leaf-petals-db
    networks:
      - leaf_petals_network

  leaf-petals-db:
    image: mongo:latest
    container_name: leaf_petals_db
    ports:
      - "27017:27017"
    networks:
      - leaf_petals_network

networks:
  leaf_petals_network:
    driver: bridge