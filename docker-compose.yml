version: "3.9"

services:
  web:
    image: shahmeerali01/leafandpetals:latest
    container_name: leafandpetals_web
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - MONGODB_URI=mongodb://db:27017/plantshop
      - NEXTAUTH_SECRET=my_super_secret_plant_shop_key_2026
      - NEXTAUTH_URL=http://16.176.177.87:8081
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mongo:latest
    container_name: leafandpetals_db
    restart: unless-stopped
   
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db 
    networks:
      - app-network

networks:
  app-network:

volumes:
  mongo_data: